name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $cargoLine = Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $cargoVersion = $cargoLine.Matches[0].Groups[1].Value

          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion"
          }
          if ($tauriVersion -ne $tagVersion) {
            throw "tauri.conf.json version $tauriVersion does not match tag $tagVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "Cargo.toml version $cargoVersion does not match tag $tagVersion"
          }

          $requiredIcons = @(
            "src-tauri/icons/32x32.png",
            "src-tauri/icons/128x128.png",
            "src-tauri/icons/128x128@2x.png",
            "src-tauri/icons/icon.ico",
            "src-tauri/icons/icon.icns"
          )
          foreach ($icon in $requiredIcons) {
            if (!(Test-Path $icon)) {
              throw "Missing required Tauri icon: $icon"
            }
            if ((Get-Item $icon).Length -le 0) {
              throw "Required Tauri icon is empty: $icon"
            }
          }

      - name: Build frontend
        run: npm run build

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CC Sessions ${{ github.ref_name }}
          releaseBody: |
            ## Changes

            ### 新增
            - 新增 CLI Web UI：可通过 `cc-sessions webui --host 127.0.0.1 --port 17888` 在无桌面环境、WSL、服务器或 SSH 场景中使用浏览器管理会话。
            - CLI 发布包内置 Web UI 前端资源，并包含 `cc-sessions.portable` 标记文件，便携包可直接在可执行文件旁持久化 Web UI 设置。
            - CLI 会话预览支持完整正文输出、`--summary` 一行摘要、`--raw` 原始 JSONL，以及 `--all` / `--limit 0` 读取完整文件。
            - 交互式 CLI 菜单支持选择完整正文、一行摘要或原始 JSONL 预览会话。
            - 新增启动加载页和 favicon，降低桌面端与浏览器 Web UI 初始化时的白屏感。

            ### 改进
            - Web UI 设置持久化策略更明确：便携包写入可执行文件同目录；安装版或自定义构建写入系统用户配置目录；也可通过 `CC_SESSIONS_WEBUI_SETTINGS` 显式指定配置文件。
            - `cc-sessions --provider claude webui` 会默认进入 Claude 页面，`--provider codex` 会默认进入 Codex 页面。
            - 浏览器 Web UI 中的目录、文件和 zip 保存入口改为手动输入运行 Web UI 环境可访问的路径，桌面端仍使用系统对话框。
            - 发布打包流程会清理旧 Tauri bundle，并只打包当前版本产物，减少旧版本安装包混入 release 的风险。

            ### 安全
            - Web UI 启动时生成一次性 API token，并要求浏览器请求携带该 token，避免其他网页直接调用本机 Web UI API。

            ### 修复
            - 修复浏览器 Web UI 中复制 resume 命令可能提示成功但实际未写入剪贴板的问题；复制失败时会明确提示。
            - 修复 Web UI 设置此前仅保存在内存中，服务重启后丢失的问题。
            - 修复 Web UI 响应序列化失败时可能返回 200 错误体的问题，改为明确返回 500。
            - 修复 Web UI 前端运行时配置注入对损坏 `index.html` 过度宽容的问题，缺少 `</head>` 时会直接暴露错误。
          releaseDraft: false
          prerelease: false

      - name: Create CLI package
        shell: pwsh
        run: node scripts/package-release.mjs --target cli --build-product

      - name: Upload CLI package
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $platform = switch ("${{ runner.os }}") {
            "Windows" { "windows" }
            "macOS" { "macos" }
            "Linux" { "linux" }
            default { throw "Unsupported runner OS: ${{ runner.os }}" }
          }
          $asset = "release/cc-sessions-cli-v$version-$platform.zip"
          if (!(Test-Path $asset)) {
            throw "CLI package was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber

      - name: Create Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: node scripts/package-release.mjs --target portable

      - name: Upload Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $asset = "release/cc-session-manager-portable-v$version-windows.exe"
          if (!(Test-Path $asset)) {
            throw "Windows portable executable was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber
