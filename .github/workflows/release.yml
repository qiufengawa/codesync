name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $cargoLine = Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $cargoVersion = $cargoLine.Matches[0].Groups[1].Value

          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion"
          }
          if ($tauriVersion -ne $tagVersion) {
            throw "tauri.conf.json version $tauriVersion does not match tag $tagVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "Cargo.toml version $cargoVersion does not match tag $tagVersion"
          }

          $requiredIcons = @(
            "src-tauri/icons/32x32.png",
            "src-tauri/icons/128x128.png",
            "src-tauri/icons/128x128@2x.png",
            "src-tauri/icons/icon.ico",
            "src-tauri/icons/icon.icns"
          )
          foreach ($icon in $requiredIcons) {
            if (!(Test-Path $icon)) {
              throw "Missing required Tauri icon: $icon"
            }
            if ((Get-Item $icon).Length -le 0) {
              throw "Required Tauri icon is empty: $icon"
            }
          }

      - name: Build frontend
        run: npm run build

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CC Sessions ${{ github.ref_name }}
          releaseBody: |
            ## Changes

            ### 新增
            - 支持在 Windows 下通过 WSL UNC 路径读取 WSL 环境中的 Codex 数据目录，并将 Codex 记录中的 Linux 路径映射为可访问的 WSL UNC 路径。
            - 支持 Codex 与 Claude Code 子代理会话识别；桌面端新增“子代理”开关，关闭时显示主会话，开启时只显示子代理会话。
            - CLI 支持子代理范围过滤：`list`、`search`、`projects` 默认显示主会话，加入 `--subagent` 后只显示子代理。
            - 交互式 CLI 菜单支持选择只查看子代理会话，并保留按时间、项目和大小查看能力。
            - README 补充 WSL Codex 目录、子代理、CLI menu 推荐入口说明。

            ### 修复
            - 修复 Windows 直接读取 WSL live SQLite 数据库时可能遇到锁定或读取失败的问题。
            - 修复 Claude Code 子代理 transcript 此前被扫描器跳过，无法在会话管理中查看、预览、备份或导出的问题。
          releaseDraft: false
          prerelease: false

      - name: Create CLI package
        shell: pwsh
        run: node scripts/package-release.mjs --target cli --build-product

      - name: Upload CLI package
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $platform = switch ("${{ runner.os }}") {
            "Windows" { "windows" }
            "macOS" { "macos" }
            "Linux" { "linux" }
            default { throw "Unsupported runner OS: ${{ runner.os }}" }
          }
          $asset = "release/cc-sessions-cli-v$version-$platform.zip"
          if (!(Test-Path $asset)) {
            throw "CLI package was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber

      - name: Create Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: node scripts/package-release.mjs --target portable

      - name: Upload Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $asset = "release/cc-session-manager-portable-v$version-windows.exe"
          if (!(Test-Path $asset)) {
            throw "Windows portable executable was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber
