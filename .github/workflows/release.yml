name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - windows-latest
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $cargoLine = Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $cargoVersion = $cargoLine.Matches[0].Groups[1].Value

          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion"
          }
          if ($tauriVersion -ne $tagVersion) {
            throw "tauri.conf.json version $tauriVersion does not match tag $tagVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "Cargo.toml version $cargoVersion does not match tag $tagVersion"
          }

          $requiredIcons = @(
            "src-tauri/icons/32x32.png",
            "src-tauri/icons/128x128.png",
            "src-tauri/icons/128x128@2x.png",
            "src-tauri/icons/icon.ico",
            "src-tauri/icons/icon.icns"
          )
          foreach ($icon in $requiredIcons) {
            if (!(Test-Path $icon)) {
              throw "Missing required Tauri icon: $icon"
            }
            if ((Get-Item $icon).Length -le 0) {
              throw "Required Tauri icon is empty: $icon"
            }
          }

      - name: Build frontend
        run: npm run build

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CC Sessions ${{ github.ref_name }}
          releaseBody: |
            See README.md for installation and usage notes.
          releaseDraft: false
          prerelease: false
