name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }} ${{ matrix.target }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ""
          - platform: ubuntu-latest
            target: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          $packageVersion = node -p "require('./package.json').version"
          $tauriVersion = node -p "require('./src-tauri/tauri.conf.json').version"
          $cargoLine = Select-String -Path "src-tauri/Cargo.toml" -Pattern '^version = "([^"]+)"' | Select-Object -First 1
          $cargoVersion = $cargoLine.Matches[0].Groups[1].Value

          if ($packageVersion -ne $tagVersion) {
            throw "package.json version $packageVersion does not match tag $tagVersion"
          }
          if ($tauriVersion -ne $tagVersion) {
            throw "tauri.conf.json version $tauriVersion does not match tag $tagVersion"
          }
          if ($cargoVersion -ne $tagVersion) {
            throw "Cargo.toml version $cargoVersion does not match tag $tagVersion"
          }

          $requiredIcons = @(
            "src-tauri/icons/32x32.png",
            "src-tauri/icons/128x128.png",
            "src-tauri/icons/128x128@2x.png",
            "src-tauri/icons/icon.ico",
            "src-tauri/icons/icon.icns"
          )
          foreach ($icon in $requiredIcons) {
            if (!(Test-Path $icon)) {
              throw "Missing required Tauri icon: $icon"
            }
            if ((Get-Item $icon).Length -le 0) {
              throw "Required Tauri icon is empty: $icon"
            }
          }

      - name: Build frontend
        run: npm run build

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: CodeSync ${{ github.ref_name }}
          args: ${{ matrix.target && format('--target {0}', matrix.target) || '' }}
          releaseBody: |
            ## CodeSync v0.4.0

            ### 新增
            - 支持 OpenCode 作为第三个 provider，读取 `opencode.db` SQLite 数据库
            - OpenCode 备份/还原功能对齐（导出 session/message/part 为 JSON，还原时写回）
            - OpenCode Bundle 导入导出功能对齐
            - 跨平台 OpenCode 默认路径检测（macOS/Linux/Windows）
            - 极简瑞士风 UI 全面重构
            - 官方 Provider SVG Logo（OpenCode/OpenAI/Claude）
            - 48px 图标栏布局

            ### 改进
            - 全品牌改名 cc-sessions → CodeSync
            - 内部二进制名改为 codesync / codesync-cli
            - macOS 支持 Apple Silicon + Intel 双架构发布

            ### 修复
            - 修复通知弹窗样式未加载导致 toast 撑开页面布局的问题。
            - 修复 Claude Code 在中转 provider、长会话 compact 后续聊等场景下，GUI 因无法从会话文件头尾窗口推导标题而不显示历史会话的问题；修复时会在 jsonl 末尾追加与官方重命名一致的 `custom-title` 记录，不改动既有会话内容。
          releaseDraft: false
          prerelease: false

      - name: Create CLI package
        shell: pwsh
        run: node scripts/package-release.mjs --target cli --build-product

      - name: Upload CLI package
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $platform = switch ("${{ runner.os }}") {
            "Windows" { "windows" }
            "macOS" { "macos" }
            "Linux" { "linux" }
            default { throw "Unsupported runner OS: ${{ runner.os }}" }
          }
          $asset = "release/codesync-cli-v$version-$platform.zip"
          if (!(Test-Path $asset)) {
            throw "CLI package was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber

      - name: Create Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: node scripts/package-release.mjs --target portable

      - name: Upload Windows portable executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = node -p "require('./package.json').version"
          $asset = "release/codesync-portable-v$version-windows.exe"
          if (!(Test-Path $asset)) {
            throw "Windows portable executable was not found: $asset"
          }
          gh release upload "${{ github.ref_name }}" $asset --clobber
